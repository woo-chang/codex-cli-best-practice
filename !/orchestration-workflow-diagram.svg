<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#666"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="280" fill="#fafafa" rx="10"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14" font-weight="bold">Codex CLI Orchestration Workflow</text>

  <!-- User/Caller -->
  <circle cx="80" cy="130" r="38" fill="#E07C4C" filter="url(#shadow)"/>
  <text x="80" y="126" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">User</text>
  <text x="80" y="142" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" opacity="0.9">Caller</text>

  <!-- Arrow 1: User -> weather-fetcher -->
  <line x1="123" y1="130" x2="198" y2="130" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="160" y="120" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">invoke</text>

  <!-- weather-fetcher Skill Box -->
  <rect x="208" y="85" width="230" height="90" rx="8" fill="#9B59B6" stroke="#8E44AD" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="323" y="112" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="bold">Skill</text>
  <text x="323" y="134" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" opacity="0.9">skills/weather-fetcher</text>
  <text x="323" y="160" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" opacity="0.7">Fetches temp from Open-Meteo API</text>
  <!-- Description below -->
  <text x="323" y="200" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Returns: temp + unit + city</text>

  <!-- Arrow 2: weather-fetcher -> weather-svg-creator -->
  <line x1="443" y1="130" x2="518" y2="130" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="480" y="120" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">data</text>

  <!-- weather-svg-creator Skill Box -->
  <rect x="528" y="85" width="260" height="90" rx="8" fill="#9B59B6" stroke="#8E44AD" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="658" y="112" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="bold">Skill</text>
  <text x="658" y="134" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" opacity="0.9">skills/weather-svg-creator</text>
  <text x="658" y="160" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" opacity="0.7">Creates SVG weather card</text>
  <!-- Description below -->
  <text x="658" y="200" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Creates: orchestration-workflow/weather.svg</text>

  <!-- Legend -->
  <rect x="220" y="232" width="12" height="12" rx="2" fill="#E07C4C"/>
  <text x="238" y="243" fill="#666" font-family="system-ui" font-size="11">User/Caller</text>
  <rect x="360" y="232" width="12" height="12" rx="2" fill="#9B59B6"/>
  <text x="378" y="243" fill="#666" font-family="system-ui" font-size="11">Skill</text>

  <!-- Flow description -->
  <text x="410" y="268" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="11">
    weather-fetcher (Skill) → weather-svg-creator (Skill) → weather.svg
  </text>
</svg>