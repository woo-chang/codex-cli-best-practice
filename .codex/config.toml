# Codex CLI — Team-shared project configuration
#
# This file is checked into the repository and provides shared defaults
# for all team members. Personal overrides go in ~/.codex/config.toml
# or use CLI flags (--model, --approval-policy, --config key=value).
#
# Reference: https://developers.openai.com/codex/config-reference/

################################################################################
# Core Settings
################################################################################

# Primary model used by Codex for this project.
model = "o4-mini"

# Sandbox mode controls file system and network access.
# Options: "read-only", "workspace-write", "danger-full-access"
sandbox_mode = "workspace-write"

# Approval policy controls when Codex asks before running commands.
# Options: "untrusted", "on-request", "never"
approval_policy = "on-request"

################################################################################
# Notifications
################################################################################

# Optional external command for end-user notifications.
# The command receives a JSON payload on stdin with turn details.
#
# Examples:
#   notify = ["terminal-notifier", "-title", "Codex", "-message"]
#   notify = ["osascript", "-e", "display notification \"Codex done\" with title \"Codex\""]
#
# notify = ["terminal-notifier", "-title", "Codex", "-message", "Task complete"]

################################################################################
# MCP Servers
################################################################################

# MCP (Model Context Protocol) servers extend Codex with external tool access.
# Define servers here so all team members share the same integrations.

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

# --- Example: Streamable HTTP transport ---
# [mcp_servers.remote-tools]
# enabled = true
# url = "https://mcp.example.com/sse"

# --- Example: STDIO server with environment variables ---
# [mcp_servers.database]
# enabled = true
# command = "db-mcp-server"
# args = ["--connection-string", "$DATABASE_URL"]
# env = { DATABASE_URL = "" }

################################################################################
# Profiles
################################################################################

# Profiles let you switch between different configurations quickly.
# Usage: codex --profile <name>
#
# Set a default profile by uncommenting:
# profile = "development"

# Conservative: Maximum safety for code review and auditing.
# Read-only sandbox, asks before every action.
[profiles.conservative]
sandbox_mode = "read-only"
approval_policy = "untrusted"

# Development: Balanced safety for everyday coding.
# Can write to workspace, auto-approves sandbox failures.
[profiles.development]
sandbox_mode = "workspace-write"
approval_policy = "on-request"

# Trusted: Full autonomy with a powerful model.
# Writes to workspace, never asks for approval. Use with caution.
[profiles.trusted]
model = "o3"
sandbox_mode = "workspace-write"
approval_policy = "never"

# CI: Optimized for continuous integration pipelines.
# Non-interactive, cost-efficient model, no approval prompts.
[profiles.ci]
model = "o4-mini"
sandbox_mode = "workspace-write"
approval_policy = "never"

# Review: Thorough code review with a powerful model.
# Read-only for safety, asks the model to decide when to prompt.
[profiles.review]
model = "o3"
sandbox_mode = "read-only"
approval_policy = "on-request"
